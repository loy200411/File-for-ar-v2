<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur AR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; flex-grow: 1; background-color: #f0f0f0; }
        #ar-button {
            background-color: #007bff;
            border-radius: 5px;
            border: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <model-viewer 
        src="" 
        ios-src="Table%20azimut%20v8.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            VOIR DANS MON ESPACE (AR)
        </button>
    </model-viewer>
</body>
</html>
